<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Broadcast</title>

    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="container">

    <h1>Broadcaster</h1>

    <p id="roomInfo"></p>

    <p>
        Status:
        <span id="liveStatus">Offline</span>
    </p>

    <p>
        Viewers:
        <span id="viewerCount">0</span>
    </p>

    <video
        id="localVideo"
        autoplay
        muted
        playsinline>
    </video>

    <br><br>

    <button id="startBtn">
        Go Live
    </button>

</div>

<script src="https://unpkg.com/livekit-client@1.15.13/dist/livekit-client.umd.js"></script>
<script src="/js/broadcaster.js"></script>

</body>
</html>
