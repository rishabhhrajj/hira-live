<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Rashi ❤️ Himanshu Wedding Live
</title>

<link rel="stylesheet" href="/css/style.css">

<style>

html,
body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
    font-family:Georgia, serif;
}

#videoContainer{
    width:100vw;
    height:100vh;
    background:black;
}

#videoContainer video{
    width:100%;
    height:100%;
    object-fit:contain;
    background:black;
}

#liveBadge{

    position:fixed;

    top:15px;
    left:15px;

    z-index:999;

    background:#e11d48;

    color:white;

    padding:10px 18px;

    border-radius:30px;

    font-weight:bold;

    box-shadow:
    0 0 20px rgba(255,0,0,.5);
}

#coupleBadge{

    position:fixed;

    top:15px;
    left:50%;

    transform:translateX(-50%);

    z-index:999;

    color:#f7d98a;

    font-size:24px;

    font-weight:bold;

    text-shadow:
    0 0 15px rgba(255,215,0,.6);
}

#fullscreenBtn{

    position:fixed;

    top:15px;
    right:15px;

    z-index:999;

    background:
    rgba(0,0,0,.65);

    color:white;

    border:none;

    border-radius:10px;

    padding:12px 18px;

    cursor:pointer;
}

#bottomMessage{

    position:fixed;

    bottom:20px;

    left:50%;

    transform:
    translateX(-50%);

    z-index:999;

    background:
    rgba(0,0,0,.55);

    color:white;

    padding:12px 20px;

    border-radius:30px;

    text-align:center;

    backdrop-filter:blur(8px);
}

#bottomMessage span{

    color:#f7d98a;
}

@media(max-width:768px){

    #coupleBadge{
        font-size:18px;
        top:65px;
    }

    #bottomMessage{
        width:90%;
        font-size:14px;
    }
}

</style>

</head>

<body>

<div id="liveBadge">
🔴 LIVE
</div>

<div id="coupleBadge">
Rashi ❤️ Himanshu
</div>

<button id="fullscreenBtn">
⛶ Fullscreen
</button>

<div id="videoContainer"></div>

<div id="bottomMessage">

Thank you for being part of
our special day ❤️

<br>

<span>
With Love,
Rashi & Himanshu
</span>

</div>

<script src="https://unpkg.com/livekit-client@1.15.13/dist/livekit-client.umd.js"></script>

<script src="/js/viewer.js"></script>

<script>

document
.getElementById("fullscreenBtn")
.addEventListener("click", () => {

const video =
document.querySelector("video");

if(video){

video.requestFullscreen();

}

});

</script>

</body>
</html>
