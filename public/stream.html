<!DOCTYPE html>
<html>
<head>
    <title>Hira Live Stream</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="/css/style.css">

    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: black;
            overflow: hidden;
        }

        #videoContainer {
            width: 100vw;
            height: 100vh;
        }

        #videoContainer video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: black;
        }

        #liveBadge {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 999;
            background: red;
            color: white;
            padding: 8px 14px;
            border-radius: 8px;
            font-weight: bold;
        }

        #fullscreenBtn {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 999;

            background: rgba(0,0,0,0.7);
            color: white;

            border: none;
            border-radius: 8px;

            padding: 10px 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="liveBadge">
    🔴 LIVE
</div>

<button id="fullscreenBtn">
    ⛶ Fullscreen
</button>

<div id="videoContainer"></div>

<script src="https://unpkg.com/livekit-client@1.15.13/dist/livekit-client.umd.js"></script>
<script src="/js/viewer.js"></script>

<script>
document
  .getElementById("fullscreenBtn")
  .addEventListener("click", () => {

    const video =
      document.querySelector("video");

    if (video) {
      video.requestFullscreen();
    }
  });
</script>

</body>
</html>
