<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Rashi ❤️ Himanshu Wedding Live
</title>

<link
href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Poppins:wght@300;400;500&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,
body{

width:100%;
height:100%;

overflow:hidden;

background:black;

font-family:'Poppins',sans-serif;
}

#videoContainer{

width:100vw;
height:100vh;

background:black;
}

#videoContainer video{

width:100%;
height:100%;

object-fit:contain;

background:black;
}

/* Live Badge */

#liveBadge{

position:fixed;

top:20px;
left:20px;

z-index:999;

background:#dc2626;

color:white;

padding:10px 18px;

border-radius:30px;

font-weight:600;

box-shadow:
0 0 20px rgba(255,0,0,.5);
}

/* Couple Name */

#coupleName{

position:fixed;

top:20px;

left:50%;

transform:
translateX(-50%);

z-index:999;

font-family:'Cinzel',serif;

font-size:28px;

font-weight:700;

color:#D4AF37;

text-shadow:
0 0 15px rgba(212,175,55,.8);
}

/* Fullscreen Button */

#fullscreenBtn{

position:fixed;

top:20px;
right:20px;

z-index:999;

background:
rgba(0,0,0,.6);

backdrop-filter:
blur(8px);

color:white;

border:none;

border-radius:12px;

padding:12px 18px;

cursor:pointer;
}

/* Bottom Message */

#bottomMessage{

position:fixed;

bottom:20px;

left:50%;

transform:
translateX(-50%);

z-index:999;

background:
rgba(0,0,0,.45);

backdrop-filter:
blur(10px);

padding:14px 25px;

border-radius:40px;

color:white;

text-align:center;
}

#bottomMessage span{

color:#D4AF37;

font-weight:600;
}

/* Decorative Border */

.frame{

position:fixed;

top:10px;
left:10px;

width:
calc(100% - 20px);

height:
calc(100% - 20px);

border:
2px solid rgba(212,175,55,.35);

pointer-events:none;

z-index:998;
}

/* Floating Petals */

.petals{

position:fixed;

width:100%;
height:100%;

pointer-events:none;

overflow:hidden;

z-index:997;
}

.petal{

position:absolute;

top:-50px;

font-size:22px;

animation:
fall linear infinite;
}

.petal:nth-child(1){
left:10%;
animation-duration:12s;
}

.petal:nth-child(2){
left:25%;
animation-duration:16s;
}

.petal:nth-child(3){
left:40%;
animation-duration:14s;
}

.petal:nth-child(4){
left:60%;
animation-duration:18s;
}

.petal:nth-child(5){
left:75%;
animation-duration:15s;
}

.petal:nth-child(6){
left:90%;
animation-duration:13s;
}

@keyframes fall{

0%{
transform:
translateY(-50px)
rotate(0deg);
}

100%{
transform:
translateY(110vh)
rotate(360deg);
}

}

@media(max-width:768px){

#coupleName{

font-size:18px;

top:70px;
}

#bottomMessage{

width:90%;

font-size:13px;
}

}

</style>

</head>

<body>

<div class="frame"></div>

<div class="petals">

<div class="petal">🌸</div>
<div class="petal">🌸</div>
<div class="petal">🌸</div>
<div class="petal">🌸</div>
<div class="petal">🌸</div>
<div class="petal">🌸</div>

</div>

<div id="liveBadge">
🔴 LIVE
</div>

<div id="coupleName">
Rashi ❤️ Himanshu
</div>

<button id="fullscreenBtn">
⛶ Fullscreen
</button>

<div id="videoContainer"></div>

<div id="bottomMessage">

Thank you for joining
our wedding celebration ❤️

<br>

<span>
With Love,
Rashi & Himanshu
</span>

</div>

<script src="https://unpkg.com/livekit-client@1.15.13/dist/livekit-client.umd.js"></script>

<script src="/js/viewer.js"></script>

<script>

document
.getElementById("fullscreenBtn")
.addEventListener("click", () => {

const video =
document.querySelector("video");

if(video){

video.requestFullscreen();

}

});

</script>

</body>
</html>
